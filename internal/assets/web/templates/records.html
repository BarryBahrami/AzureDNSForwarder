{{define "content"}}
<h1>Static records</h1>
<p class="muted">Locally-resolved records served by the forwarder without asking any upstream. Names can be any valid DNS label &mdash; <code>db</code> works just as well as <code>db.corp.local</code>. Useful for short-lived or stub names.</p>
<form id="add-form" class="row">
  <input name="name" placeholder="db or db.corp.local" required>
  <select name="type">
    <option>A</option><option>AAAA</option><option>CNAME</option>
  </select>
  <input name="value" placeholder="10.1.2.3" required>
  <input name="ttl" type="number" placeholder="300" value="300">
  <label class="check"><input type="checkbox" name="do_not_sync" value="1"> Do not sync with peers</label>
  <input name="sync_peers" placeholder="peer names (default: all)">
  <button type="submit">Add</button>
</form>
<table id="recs">
  <thead><tr><th>Name</th><th>Type</th><th>Value</th><th>TTL</th><th>Sync</th><th></th></tr></thead>
  <tbody></tbody>
</table>
{{end}}
{{template "base.html" .}}
